<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetic Arena - Ticket Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-container": "#005b2b",
                        "on-primary": "#006530",
                        "primary-dim": "#00ed7b",
                        "surface-container": "#181a19",
                        "background": "#0d0f0e",
                        "secondary-dim": "#679dff",
                        "primary": "#a5ffb8",
                        "inverse-primary": "#006e36",
                        "tertiary-dim": "#ff734a",
                        "tertiary-container": "#ff5722",
                        "on-error-container": "#ffa8a3",
                        "on-tertiary-fixed": "#340800",
                        "on-surface-variant": "#aaaba9",
                        "on-secondary-fixed": "#003270",
                        "tertiary": "#ff734a",
                        "on-primary-fixed": "#004620",
                        "surface": "#0d0f0e",
                        "on-tertiary-container": "#250400",
                        "on-background": "#f7f6f4",
                        "error": "#ff716c",
                        "surface-dim": "#0d0f0e",
                        "on-primary-fixed-variant": "#006631",
                        "on-tertiary": "#430c00",
                        "on-surface": "#f7f6f4",
                        "on-error": "#490006",
                        "surface-variant": "#242625",
                        "surface-container-highest": "#242625",
                        "secondary-container": "#005bc0",
                        "outline-variant": "#474847",
                        "outline": "#747674",
                        "inverse-surface": "#faf9f7",
                        "on-tertiary-fixed-variant": "#6f1a00",
                        "surface-tint": "#a5ffb8",
                        "primary-container": "#00fd84",
                        "error-container": "#9f0519",
                        "error-dim": "#d7383b",
                        "secondary": "#679dff",
                        "inverse-on-surface": "#545554",
                        "on-secondary": "#001f49",
                        "on-secondary-fixed-variant": "#004ea6",
                        "surface-container-high": "#1e201f",
                        "tertiary-fixed": "#ff9475",
                        "surface-container-low": "#121413",
                        "primary-fixed-dim": "#00ed7b",
                        "primary-fixed": "#00fd84",
                        "tertiary-fixed-dim": "#ff7d57",
                        "secondary-fixed-dim": "#a8c4ff",
                        "surface-bright": "#2a2d2b",
                        "secondary-fixed": "#bed2ff",
                        "surface-container-lowest": "#000000",
                        "on-secondary-container": "#f7f7ff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Lexend", "sans-serif"],
                        body: ["Plus Jakarta Sans", "sans-serif"],
                        label: ["Lexend", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        /* Custom input styles to remove default borders and add bottom glow */
        input:focus {
            box-shadow: none !important;
            border-color: transparent !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Atmospheric Layer -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-20%] right-[-10%] w-[60%] h-[60%] bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-tertiary/10 blur-[100px] rounded-full pointer-events-none"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-md px-6 py-12 z-10 flex flex-col items-center">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-12 text-center w-full relative">
<h1 class="font-headline font-black text-4xl sm:text-5xl italic text-primary drop-shadow-[0_0_12px_rgba(165,255,184,0.3)] tracking-tight">KINETIC ARENA</h1>
<p class="font-body text-on-surface-variant text-sm mt-2 font-medium tracking-wide">ENTER THE MADNESS</p>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-low/80 backdrop-blur-2xl rounded-xl p-8 flex flex-col gap-8 relative">
<!-- Subtle edge highlight -->
<div class="absolute inset-0 rounded-xl border border-outline-variant/15 pointer-events-none"></div>
<div class="flex flex-col gap-2">
<h2 class="font-headline text-2xl font-bold text-on-surface">Ticket Access</h2>
<p class="font-body text-sm text-on-surface-variant">Enter your details to load your matchday pass.</p>
</div>
<form class="flex flex-col gap-6 w-full">
<!-- Mobile Number Input -->
<div class="flex flex-col gap-2 relative group">
<label class="font-label text-sm font-medium text-secondary" for="mobile">Mobile Number</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant group-focus-within:text-primary transition-colors">smartphone</span>
<input class="w-full bg-surface-container-lowest text-on-surface font-body text-base px-12 py-4 rounded-lg border-b-2 border-transparent focus:border-b-primary outline-none transition-all placeholder:text-on-surface-variant/50" id="mobile" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Ticket ID Input -->
<div class="flex flex-col gap-2 relative group">
<label class="font-label text-sm font-medium text-secondary" for="ticket">Ticket ID / Reference</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant group-focus-within:text-primary transition-colors">confirmation_number</span>
<input class="w-full bg-surface-container-lowest text-on-surface font-body text-base px-12 py-4 rounded-lg border-b-2 border-transparent focus:border-b-primary outline-none transition-all placeholder:text-on-surface-variant/50 uppercase" id="ticket" placeholder="e.g. KA-8892-XT" type="text"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full mt-4 bg-primary text-on-primary font-headline font-bold text-lg py-4 rounded-xl shadow-[0_0_24px_rgba(165,255,184,0.15)] hover:shadow-[0_0_32px_rgba(165,255,184,0.25)] hover:bg-primary-container transition-all flex items-center justify-center gap-2" type="button">
<span>ENTER ARENA</span>
<span class="material-symbols-outlined font-bold" data-icon="arrow_forward" style="font-variation-settings: 'wght' 700;">arrow_forward</span>
</button>
</form>
<!-- Support Link -->
<div class="text-center mt-4">
<a class="font-body text-sm text-secondary hover:text-primary transition-colors" href="#">Need help finding your ticket?</a>
</div>
</div>
</main>
</body></html>
